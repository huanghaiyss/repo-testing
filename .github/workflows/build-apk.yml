name: Build Hermes Bridge APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Verify signing secrets
        env:
          HB_KEYSTORE_B64: ${{ secrets.HB_KEYSTORE_B64 }}
          HB_STORE_PASSWORD: ${{ secrets.HB_STORE_PASSWORD }}
          HB_KEY_ALIAS: ${{ secrets.HB_KEY_ALIAS }}
          HB_KEY_PASSWORD: ${{ secrets.HB_KEY_PASSWORD }}
        run: |
          test -n "$HB_KEYSTORE_B64"
          test -n "$HB_STORE_PASSWORD"
          test -n "$HB_KEY_ALIAS"
          test -n "$HB_KEY_PASSWORD"

      - name: Restore signing keystore
        env:
          HB_KEYSTORE_B64: ${{ secrets.HB_KEYSTORE_B64 }}
        run: printf '%s' "$HB_KEYSTORE_B64" | base64 --decode > "$RUNNER_TEMP/hermesbridge.jks"

      - name: Build signed release APK
        env:
          HB_KEYSTORE_PATH: ${{ runner.temp }}/hermesbridge.jks
          HB_STORE_PASSWORD: ${{ secrets.HB_STORE_PASSWORD }}
          HB_KEY_ALIAS: ${{ secrets.HB_KEY_ALIAS }}
          HB_KEY_PASSWORD: ${{ secrets.HB_KEY_PASSWORD }}
        run: gradle --no-daemon :app:assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HermesBridge-debug-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
