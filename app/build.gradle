plugins {
    id 'com.android.application'
}

android {
    namespace 'com.chris.hermesbridge'
    compileSdk 35

    defaultConfig {
        applicationId 'com.chris.hermesbridge'
        minSdk 24
        targetSdk 35
        versionCode 2
        versionName '0.2.0'
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    lint {
        abortOnError false
    }
}
